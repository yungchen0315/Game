// UI 按鈕統一用這個綁定，不要單獨依賴瀏覽器的 click 事件：
// 部分手機瀏覽器/WebView 由原始 touchstart+touchend 合成 click 事件的時機不穩定，
// 曾經造成「按了開始遊戲/建造按鈕卻完全沒反應，畫面卡住」的回報。
// 直接在 touchend 處理並 preventDefault，同時保留 click 作為備援（用旗標避免兩邊都觸發）。
// 「看起來灰掉的按鈕」（.disabled）在這個 UI 裡其實只是換個樣式，並沒有真的
// pointer-events:none，點下去 handler 內部檢查資源/人口不足還是會靜靜地什麼也不做——
// 玩家會以為按鈕壞掉了。統一在這裡攔截：灰掉的按鈕點下去先做一個「抖動」提示，
// 不呼叫實際 handler，讓玩家清楚知道「有反應，但目前不能這麼做」。
function fireDenied(el) {
  el.classList.remove('denied');
  void el.offsetWidth;
  el.classList.add('denied');
}

function onTap(el, handler) {
  let handledAt = 0;
  const dispatch = (e) => {
    if (el.classList.contains('disabled')) {
      fireDenied(el);
      return;
    }
    handler(e);
  };
  el.addEventListener('touchend', (e) => {
    e.preventDefault();
    e.stopPropagation();
    handledAt = Date.now();
    dispatch(e);
  }, { passive: false });
  el.addEventListener('click', (e) => {
    if (Date.now() - handledAt < 500) return;
    dispatch(e);
  });
}

function costText(cost) {
  return Object.entries(cost || {}).map(([k, v]) => `${k === 'wood' ? '木' : k === 'food' ? '食' : '金'}${v}`).join(' ');
}

// 相機縮放：依畫面大小自動計算，確保無論手機螢幕多小、UI 面板佔掉多少空間，
// 畫面中至少能看到足夠寬廣的地圖範圍（參考手機帝國類遊戲的地圖可視範圍設計），
// 避免視角過度貼近導致難以掌握全局、找不到路。
let zoom = 1;
const TARGET_TILES_X = 20;
const TARGET_TILES_Y = 11;

function estimateChromeHeight() {
  const topbarH = Math.min(48, Math.max(38, canvas.height * 0.07));
  const bottomExpandedH = Math.min(190, Math.max(112, canvas.height * 0.24));
  return { topbarH, bottomExpandedH };
}

function computeZoom() {
  const { topbarH, bottomExpandedH } = estimateChromeHeight();
  const availW = canvas.width;
  const availH = Math.max(120, canvas.height - topbarH - bottomExpandedH);
  zoom = Math.min(availW / (TARGET_TILES_X * TILE), availH / (TARGET_TILES_Y * TILE));
  zoom = Math.max(0.5, Math.min(1.2, zoom));
}

function viewW() { return canvas.width / zoom; }
function viewH() { return canvas.height / zoom; }

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  computeZoom();
  if (camera) clampCamera();
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

function placeStartingBuilding(player, type, x, y) {
  const b = createBuilding(player, type, x, y, { instant: true });
  player.buildings.push(b);
  state.map.setFootprint(x, y, b.sizeTiles, true);
  return b;
}

function initGame(setup) {
  gameSetup = setup || gameSetup;
  const numPlayers = 1 + gameSetup.numOpponents;
  const gen = generateMap(numPlayers);

  human = new Player(0, '玩家', false, gameSetup.civKey, null);
  const otherCivs = CIV_KEYS.filter((k) => k !== gameSetup.civKey);
  aiPlayers = [];
  for (let i = 1; i < numPlayers; i++) {
    const civKey = otherCivs.length > 0 ? otherCivs[(i - 1) % otherCivs.length] : CIV_KEYS[i % CIV_KEYS.length];
    aiPlayers.push(new Player(i, `電腦 ${i}`, true, civKey, gameSetup.difficulty));
  }
  const allPlayers = [human, ...aiPlayers];
  state = { map: gen.map, players: allPlayers, projectiles: [], time: 0, ended: false, winner: null, winReason: null };

  aiStates = [];
  for (let i = 0; i < allPlayers.length; i++) {
    const p = allPlayers[i];
    const start = gen.starts[i];
    placeStartingBuilding(p, 'TownCenter', start.x, start.y);
    const villagerCount = STARTING_VILLAGERS + (p.extraVillagers || 0);
    for (let k = 0; k < villagerCount; k++) {
      const ang = (k / villagerCount) * Math.PI * 2;
      p.units.push(createUnit(p, 'Villager', start.x + Math.cos(ang) * 60, start.y + Math.sin(ang) * 60));
    }
    recalcPopCap(p);
    if (p.isAI) aiStates.push(createAIState(start.x, start.y, gameSetup.difficulty));
  }

  camera = { x: gen.starts[0].x - viewW() / 2, y: gen.starts[0].y - viewH() / 2 };
  clampCamera();
  selection = [];
  placement = null;
  uiTimer = 0;
  gameOverOverlay.classList.add('hidden');
  refreshUI();
}

function clampCamera() {
  const worldW = state.map.w * TILE;
  const worldH = state.map.h * TILE;
  camera.x = Math.max(-100, Math.min(worldW - viewW() + 100, camera.x));
  camera.y = Math.max(-100, Math.min(worldH - viewH() + 100, camera.y));
}

function screenToWorld(sx, sy) {
  return { x: sx / zoom + camera.x, y: sy / zoom + camera.y };
}

// 觸控容錯半徑要換算成「螢幕像素」再依目前縮放換回世界座標，否則縮小視角看整張地圖時，
// 固定的世界座標容錯量在螢幕上會變得很小，單位（尤其是村民）就會變得很難點到。
function tapToleranceWorld(px) {
  return px / zoom;
}

function pickEntity(wx, wy) {
  let bestUnit = null;
  let bestUD = Infinity;
  const unitPad = tapToleranceWorld(16);
  for (const p of state.players) {
    for (const u of p.units) {
      if (!shouldRenderEntity(state, u)) continue;
      const d = Math.hypot(u.x - wx, u.y - wy);
      if (d <= u.radius + unitPad && d < bestUD) {
        bestUD = d;
        bestUnit = u;
      }
    }
  }
  if (bestUnit) return { kind: 'unit', ref: bestUnit };
  const buildingPad = tapToleranceWorld(6);
  let bestBuilding = null;
  let bestBD = Infinity;
  for (const p of state.players) {
    for (const b of p.buildings) {
      if (!shouldRenderEntity(state, b)) continue;
      const r = buildingRadius(b) + buildingPad;
      if (Math.abs(b.x - wx) > r || Math.abs(b.y - wy) > r) continue;
      // 挑「最近的」符合建築，而不是陣列裡第一個符合的——建築物擺得密集時，
      // 容錯範圍常常會重疊，選第一個符合的常常選錯隔壁的建築。
      const d = Math.hypot(b.x - wx, b.y - wy);
      if (d < bestBD) {
        bestBD = d;
        bestBuilding = b;
      }
    }
  }
  if (bestBuilding) return { kind: 'building', ref: bestBuilding };
  const resourcePad = tapToleranceWorld(10);
  for (const r of state.map.resources) {
    const d = Math.hypot(r.x - wx, r.y - wy);
    if (d <= r.radius + resourcePad) return { kind: 'resource', ref: r };
  }
  for (const relic of state.map.relics) {
    const d = Math.hypot(relic.x - wx, relic.y - wy);
    if (d <= relic.radius + resourcePad) return { kind: 'relic', ref: relic };
  }
  return null;
}

function selectAtPoint(wx, wy) {
  const pick = pickEntity(wx, wy);
  if (pick && pick.kind !== 'resource') {
    selection = [pick.ref];
  } else {
    selection = [];
  }
  refreshUI();
}

function handleBoxSelect(x1, y1, x2, y2) {
  const minX = Math.min(x1, x2);
  const maxX = Math.max(x1, x2);
  const minY = Math.min(y1, y2);
  const maxY = Math.max(y1, y2);
  const found = human.units.filter((u) => u.x >= minX && u.x <= maxX && u.y >= minY && u.y <= maxY);
  if (found.length > 0) {
    selection = found;
  } else {
    selectAtPoint((minX + maxX) / 2, (minY + maxY) / 2);
    return;
  }
  refreshUI();
}

function currentLineType(player, root) {
  return player.unitLine[root] || root;
}

function commandAtPoint(wx, wy) {
  if (placement) {
    placement = null;
    refreshUI();
    return;
  }
  const myUnits = selection.filter((e) => e.kind === 'unit' && e.owner === human);
  if (myUnits.length === 0) {
    const myBuilding = selection.find((e) => e.kind === 'building' && e.owner === human && e.def.trains);
    if (myBuilding) myBuilding.rally = { x: wx, y: wy };
    // 只有訓練建築（主城/兵營等）被選取、沒有單位時，點地圖只會設定集結點，
    // 但不清掉選取的話畫面就永遠停在該建築的資訊面板上退不出去——
    // 點完地圖後直接取消選取，讓玩家可以用「點地圖任意處」離開該畫面。
    selection = [];
    return;
  }
  const monks = myUnits.filter((u) => u.stats.class === 'monk');
  const villagers = myUnits.filter((u) => u.stats.class === 'villager');
  const combatUnits = myUnits.filter((u) => u.stats.class !== 'monk' && u.stats.class !== 'villager');
  const pick = pickEntity(wx, wy);

  if (pick && pick.kind === 'unit' && pick.ref.owner !== human) {
    for (const u of combatUnits) issueAttack(state.map, u, pick.ref);
    for (const u of villagers) issueAttack(state.map, u, pick.ref);
    for (const u of monks) issueConvert(state.map, u, pick.ref);
  } else if (pick && pick.kind === 'building' && pick.ref.owner !== human) {
    for (const u of combatUnits) issueAttack(state.map, u, pick.ref);
    for (const u of villagers) issueAttack(state.map, u, pick.ref);
    for (const u of monks) issueMove(state.map, u, pick.ref.x, pick.ref.y);
  } else if (pick && pick.kind === 'unit' && pick.ref.owner === human && pick.ref.hp < pick.ref.maxHp && monks.length > 0) {
    for (const u of monks) issueHeal(state.map, u, pick.ref);
    for (const u of [...combatUnits, ...villagers]) issueMove(state.map, u, wx, wy);
  } else if (pick && pick.kind === 'relic') {
    for (const u of monks) issueGatherRelic(state.map, u, pick.ref);
    for (const u of [...combatUnits, ...villagers]) issueMove(state.map, u, wx, wy);
  } else if (pick && pick.kind === 'resource') {
    for (const u of villagers) issueGather(state.map, u, pick.ref);
    for (const u of [...combatUnits, ...monks]) issueMove(state.map, u, pick.ref.x, pick.ref.y);
  } else if (pick && pick.kind === 'building' && pick.ref.owner === human && pick.ref.def.isFarm && pick.ref.foodLeft > 0) {
    const farm = pick.ref;
    for (const u of villagers) {
      if (!farm.worker || farm.worker === u) issueFarmWork(state.map, u, farm);
      else issueMove(state.map, u, farm.x, farm.y);
    }
  } else {
    let i = 0;
    const n = myUnits.length;
    for (const u of myUnits) {
      const ang = (i / Math.max(1, n)) * Math.PI * 2;
      const off = n > 1 ? Math.min(28, n * 3) : 0;
      issueMove(state.map, u, wx + Math.cos(ang) * off, wy + Math.sin(ang) * off);
      i++;
    }
  }
}

// 純觸控操作（不支援滑鼠/鍵盤）：
// 單指拖曳＝平移視角（最主要的手勢，對應大部分手機帝國遊戲的地圖拖曳操作）
// 單指輕點＝選取／下令（點到自己的單位/建築→選取，否則→對目前選取的單位下令）
// 單指按住不放一小段時間後再拖曳＝框選（用來一次選取多個單位）
// 雙指拖曳＝平移視角（備用手勢，效果與單指拖曳相同）
function handleTapCommand(wx, wy) {
  const pick = pickEntity(wx, wy);
  const myUnits = selection.filter((e) => e.kind === 'unit' && e.owner === human);
  const myTrainingBuilding = selection.find((e) => e.kind === 'building' && e.owner === human && e.def.trains);
  const hasCommandable = myUnits.length > 0 || !!myTrainingBuilding;

  // 點到「可下令目標」（敵方/資源/聖物/受傷友軍/可進駐的農田/空地）且目前有選取可下令的
  // 單位或訓練中建築時，一律視為下令，不能被「點到自己的東西就改成選取」蓋掉——
  // 這是先前農田採集、協助施工常常「點了卻沒反應」的根本原因。
  const isCommandTarget = !pick
    || pick.kind === 'resource'
    || pick.kind === 'relic'
    || pick.ref.owner !== human
    || (pick.kind === 'unit' && pick.ref.hp < pick.ref.maxHp)
    || (pick.kind === 'building' && pick.ref.def.isFarm && pick.ref.foodLeft > 0);

  if (hasCommandable && isCommandTarget) {
    commandAtPoint(wx, wy);
    // 下完指令後，若剛剛點的是自己的農田，順便把選取切成該農田，
    // 這樣底部面板會立刻顯示「有沒有村民耕作中／剩餘食物」，
    // 不用先取消選取單位再點一次才能看到農田狀態。
    if (pick && pick.kind === 'building' && pick.ref.owner === human && pick.ref.def.isFarm) {
      selection = [pick.ref];
    }
    refreshUI();
    return;
  }
  if (pick && pick.kind !== 'resource') {
    selection = [pick.ref];
    refreshUI();
  } else {
    selection = [];
    refreshUI();
  }
}

const activeTouches = new Map();
const TAP_MOVE_THRESHOLD = 10;
const LONG_PRESS_MS = 260;

let gestureMode = 'idle'; // 'idle' | 'pending' | 'pan' | 'boxselect' | 'pan2'
let gestureStart = null;
let panLast = null;
let panMidLast = null;
let longPressTimer = null;

function touchMidpoint() {
  const pts = [...activeTouches.values()];
  if (pts.length === 0) return null;
  const x = pts.reduce((s, p) => s + p.x, 0) / pts.length;
  const y = pts.reduce((s, p) => s + p.y, 0) / pts.length;
  return { x, y };
}

function clearLongPressTimer() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}

function armLongPressTimer() {
  clearLongPressTimer();
  longPressTimer = setTimeout(() => {
    longPressTimer = null;
    if (gestureMode === 'pending' && !placement) {
      gestureMode = 'boxselect';
      dragStart = { x: gestureStart.x, y: gestureStart.y };
      dragCurrent = { x: gestureStart.x, y: gestureStart.y };
    }
  }, LONG_PRESS_MS);
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!state || state.ended) return;
  for (const t of e.changedTouches) activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY });

  if (activeTouches.size >= 2) {
    clearLongPressTimer();
    gestureMode = 'pan2';
    dragStart = null;
    dragCurrent = null;
    panMidLast = touchMidpoint();
    return;
  }

  const t = [...activeTouches.values()][0];
  gestureMode = 'pending';
  gestureStart = { x: t.x, y: t.y };
  panLast = { x: t.x, y: t.y };
  dragStart = null;
  dragCurrent = null;
  pointerWorld = screenToWorld(t.x, t.y);
  armLongPressTimer();
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (activeTouches.has(t.identifier)) activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY });
  }

  if (gestureMode === 'pan2') {
    const mid = touchMidpoint();
    if (mid && panMidLast) {
      camera.x -= (mid.x - panMidLast.x) / zoom;
      camera.y -= (mid.y - panMidLast.y) / zoom;
      clampCamera();
    }
    panMidLast = mid;
    return;
  }

  const t = [...activeTouches.values()][0];
  if (!t) return;
  pointerWorld = screenToWorld(t.x, t.y);

  if (gestureMode === 'pending') {
    const dx = t.x - gestureStart.x;
    const dy = t.y - gestureStart.y;
    if (Math.hypot(dx, dy) > TAP_MOVE_THRESHOLD) {
      clearLongPressTimer();
      gestureMode = 'pan';
      camera.x -= dx / zoom;
      camera.y -= dy / zoom;
      clampCamera();
      panLast = { x: t.x, y: t.y };
    }
  } else if (gestureMode === 'pan') {
    camera.x -= (t.x - panLast.x) / zoom;
    camera.y -= (t.y - panLast.y) / zoom;
    clampCamera();
    panLast = { x: t.x, y: t.y };
  } else if (gestureMode === 'boxselect') {
    dragCurrent = { x: t.x, y: t.y };
  }
}, { passive: false });

function finishGesture() {
  clearLongPressTimer();
  if (gestureMode === 'pending') {
    const w = screenToWorld(gestureStart.x, gestureStart.y);
    if (placement) tryPlaceBuilding(w.x, w.y);
    else handleTapCommand(w.x, w.y);
  } else if (gestureMode === 'boxselect') {
    const dx = Math.abs(dragCurrent.x - dragStart.x);
    const dy = Math.abs(dragCurrent.y - dragStart.y);
    const w1 = screenToWorld(dragStart.x, dragStart.y);
    if (dx < TAP_MOVE_THRESHOLD && dy < TAP_MOVE_THRESHOLD) {
      handleTapCommand(w1.x, w1.y);
    } else {
      const w2 = screenToWorld(dragCurrent.x, dragCurrent.y);
      handleBoxSelect(w1.x, w1.y, w2.x, w2.y);
    }
  }
  gestureMode = 'idle';
  dragStart = null;
  dragCurrent = null;
}

window.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
  if (activeTouches.size === 0) {
    finishGesture();
  } else if (activeTouches.size === 1 && gestureMode === 'pan2') {
    // 兩指平移收回一指：直接切回單指平移，不誤判為點擊或框選
    clearLongPressTimer();
    const t = [...activeTouches.values()][0];
    gestureMode = 'pan';
    panLast = { x: t.x, y: t.y };
    dragStart = null;
    dragCurrent = null;
  }
}, { passive: false });
window.addEventListener('touchcancel', (e) => {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
  if (activeTouches.size === 0) {
    clearLongPressTimer();
    gestureMode = 'idle';
    dragStart = null;
    dragCurrent = null;
  }
});

function tryLockLandscape() {
  try {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  } catch (err) { /* 不支援時靜默略過即可 */ }
}
document.addEventListener('touchend', tryLockLandscape, { once: true });

function tryPlaceBuilding(wx, wy) {
  const def = BUILDINGS[placement.type];
  const { tx, ty } = state.map.worldToTile(wx, wy);
  const c = state.map.tileCenter(tx, ty);
  if (!state.map.canPlaceFootprint(c.x, c.y, def.size)) return;
  if (!human.canAfford(def.cost)) return;
  const b = startBuildingConstruction(state, human, placement.type, c.x, c.y);
  if (!b) return;
  // 城牆/城門通常要一段一段連續放置好幾格，放完一格就跳出建造模式的話，
  // 每一格都要重新開一次建造選單，非常不順手——這兩種維持建造模式，
  // 讓玩家可以直接一路點著放下去，直到手動按「取消建造」或資源不夠為止。
  if (!def.isWall && !def.isGate) placement = null;
  refreshUI();
}

function checkVictory(state) {
  if (state.ended) return;
  if (human.buildings.length === 0 && human.units.length === 0) {
    state.ended = true;
    state.winner = null;
    state.winReason = 'defeat';
    return;
  }
  const alive = state.players.filter((p) => p.buildings.length > 0 || p.units.length > 0);
  if (alive.length <= 1) {
    state.ended = true;
    state.winner = alive[0] || null;
    state.winReason = 'conquest';
  }
}

function update(dt) {
  state.time += dt;
  for (const p of state.players) {
    const unitsCopy = p.units.slice();
    for (const u of unitsCopy) updateUnit(state, u, dt);
    const buildingsCopy = p.buildings.slice();
    for (const b of buildingsCopy) updateBuilding(state, p, b, dt);
    updatePlayerAge(p, dt);
    updateRelicIncome(p, dt);
    updateWonderCountdown(state, p, dt);
    recalcPopCap(p);
  }
  updateProjectiles(state, dt);
  updateFogOfWar(state);
  for (let i = 0; i < aiPlayers.length; i++) updateAI(state, aiPlayers[i], aiStates[i], dt);

  selection = selection.filter((e) => (e.kind === 'unit' ? e.owner.units.includes(e) : e.owner.buildings.includes(e)));

  if (!state.ended) {
    checkVictory(state);
    if (state.ended) showGameOver();
  }

  uiTimer -= dt;
  if (uiTimer <= 0) {
    uiTimer = 0.25;
    refreshUI();
  }
}

function showGameOver() {
  const won = state.winner === human;
  const reasonText = { conquest: '征服了所有對手', wonder: '完成了奇觀勝利', defeat: '' }[state.winReason] || '';
  if (won) {
    gameOverText.textContent = `勝利！${reasonText}`;
  } else if (state.winReason === 'wonder' && state.winner) {
    gameOverText.textContent = `戰敗……${state.winner.name} 完成了奇觀勝利`;
  } else {
    gameOverText.textContent = '戰敗……基地已被摧毀';
  }
  gameOverStats.innerHTML = `
    <div>擊殺數：${human.stats.kills}　損失單位：${human.stats.unitsLost}</div>
    <div>最終時代：${ageLabel(human.age)}　收集聖物：${human.relics}</div>
  `;
  gameOverOverlay.classList.remove('hidden');
}
onTap(restartBtn, () => { showSetupScreen(); });
onTap(placementCancelBtn, () => { placement = null; refreshUI(); });

// ---- 地形材質：預先畫好一張可平鋪的草地紋理，避免每幀重畫雜訊 ----
const groundPattern = (() => {
  const size = TILE * 4;
  const pc = document.createElement('canvas');
  pc.width = size; pc.height = size;
  const pctx = pc.getContext('2d');
  pctx.fillStyle = '#427238';
  pctx.fillRect(0, 0, size, size);
  let seed = 42;
  const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  for (let i = 0; i < 260; i++) {
    const x = rnd() * size, y = rnd() * size;
    const shade = rnd();
    pctx.fillStyle = shade > 0.5 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.07)';
    const w = 2 + rnd() * 4;
    pctx.beginPath();
    pctx.ellipse(x, y, w, w * 0.5, rnd() * Math.PI, 0, Math.PI * 2);
    pctx.fill();
  }
  for (let i = 0; i < 40; i++) {
    const x = rnd() * size, y = rnd() * size;
    pctx.strokeStyle = 'rgba(30,60,20,0.25)';
    pctx.lineWidth = 1.5;
    pctx.beginPath();
    pctx.moveTo(x, y);
    pctx.lineTo(x + (rnd() - 0.5) * 6, y - 5 - rnd() * 4);
    pctx.stroke();
  }
  return ctx.createPattern(pc, 'repeat');
})();

function roundRectPath(x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

function drawShadow(sx, sy, rx, ry) {
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(sx, sy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawResourceNode(r) {
  const sx = r.x - camera.x;
  const sy = r.y - camera.y;
  if (sx < -30 || sy < -30 || sx > viewW() + 30 || sy > viewH() + 30) return;
  const ratio = Math.max(0.35, r.amount / r.maxAmount);
  ctx.globalAlpha = 0.4 + 0.6 * ratio;
  if (r.type === 'wood') {
    drawShadow(sx + 2, sy + 12, 13, 5);
    ctx.fillStyle = '#5a3d1f';
    ctx.fillRect(sx - 3, sy + 2, 6, 10);
    const foliage = [
      { dx: 0, dy: -18, rr: 13, c: '#254a1f' },
      { dx: -8, dy: -8, rr: 11, c: '#2f5c27' },
      { dx: 8, dy: -8, rr: 11, c: '#2f5c27' },
      { dx: 0, dy: -12, rr: 12, c: '#3f7a34' },
    ];
    for (const f of foliage) {
      ctx.fillStyle = f.c;
      ctx.beginPath();
      ctx.arc(sx + f.dx, sy + f.dy, f.rr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.arc(sx - 4, sy - 18, 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (r.type === 'gold') {
    drawShadow(sx, sy + 8, 13, 5);
    const facets = [
      { dx: 0, dy: -6, s: 10, c: '#8a6f1f' },
      { dx: -7, dy: 2, s: 8, c: '#a8862a' },
      { dx: 7, dy: 3, s: 8, c: '#9a7a22' },
    ];
    for (const f of facets) {
      ctx.fillStyle = f.c;
      ctx.beginPath();
      ctx.moveTo(sx + f.dx, sy + f.dy - f.s * 0.6);
      ctx.lineTo(sx + f.dx + f.s * 0.6, sy + f.dy);
      ctx.lineTo(sx + f.dx, sy + f.dy + f.s * 0.6);
      ctx.lineTo(sx + f.dx - f.s * 0.6, sy + f.dy);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = '#e8c14a';
    ctx.beginPath();
    ctx.moveTo(sx, sy - 11);
    ctx.lineTo(sx + 8, sy - 1);
    ctx.lineTo(sx, sy + 7);
    ctx.lineTo(sx - 8, sy - 1);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.arc(sx - 2, sy - 4, 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    drawShadow(sx, sy + 8, 12, 5);
    ctx.fillStyle = '#2f5c27';
    ctx.beginPath();
    ctx.arc(sx, sy, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3f7a34';
    ctx.beginPath();
    ctx.arc(sx - 4, sy - 3, 7, 0, Math.PI * 2);
    ctx.fill();
    const berries = [[-4, -2], [3, -4], [1, 3], [-2, 4], [5, 1]];
    for (const [bx, by] of berries) {
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.arc(sx + bx, sy + by, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawRelic(relic) {
  if (relic.carriedBy) return;
  const sx = relic.x - camera.x;
  const sy = relic.y - camera.y;
  if (sx < -30 || sy < -30 || sx > viewW() + 30 || sy > viewH() + 30) return;
  drawShadow(sx, sy + 9, 11, 4);
  const pulse = 2 + Math.sin(state.time * 2.4 + relic.x) * 1.5;
  ctx.fillStyle = 'rgba(220,180,255,0.35)';
  ctx.beginPath();
  ctx.arc(sx, sy, 13 + pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#d8a8ff';
  ctx.beginPath();
  ctx.moveTo(sx, sy - 10);
  ctx.lineTo(sx + 8, sy);
  ctx.lineTo(sx, sy + 10);
  ctx.lineTo(sx - 8, sy);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#7a3fae';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💎', sx, sy);
}

function ownerPalette(owner) {
  return owner.color;
}

function ownerColor(owner, alt) {
  const p = ownerPalette(owner);
  return alt ? p.dark : p.mid;
}

function drawHpBar(sx, sy, width, ratio, selected) {
  const h = 6;
  roundRectPath(sx - width / 2 - 1, sy - 1, width + 2, h + 2, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fill();
  const barColor = ratio > 0.5 ? '#5fbf4f' : ratio > 0.25 ? '#e6b800' : '#e53935';
  roundRectPath(sx - width / 2, sy, Math.max(2, width * Math.max(0, ratio)), h, 2.5);
  ctx.fillStyle = barColor;
  ctx.fill();
  if (selected) {
    roundRectPath(sx - width / 2 - 1, sy - 1, width + 2, h + 2, 3);
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

const BUILDING_ROOF_COLOR = { light: '#c94f3f', dark: '#8a3226' };

function drawBuildingDetail(b, sx, sy, half, pal) {
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1;
  switch (b.type) {
    case 'TownCenter': {
      const t = half * 0.32;
      for (const [cx, cy] of [[-1, -1], [1, -1], [-1, 1], [1, 1]]) {
        ctx.fillStyle = pal.darkest;
        ctx.fillRect(sx + cx * half - t / 2, sy + cy * half - t / 2, t, t);
      }
      ctx.fillStyle = BUILDING_ROOF_COLOR.light;
      ctx.beginPath();
      ctx.moveTo(sx - half * 0.75, sy - half * 0.15);
      ctx.lineTo(sx, sy - half * 1.05);
      ctx.lineTo(sx + half * 0.75, sy - half * 0.15);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.stroke();
      ctx.strokeStyle = pal.light;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx, sy - half * 1.05);
      ctx.lineTo(sx, sy - half * 1.4);
      ctx.stroke();
      ctx.fillStyle = BUILDING_ROOF_COLOR.light;
      ctx.fillRect(sx, sy - half * 1.4, half * 0.35, half * 0.2);
      break;
    }
    case 'House': {
      ctx.fillStyle = BUILDING_ROOF_COLOR.dark;
      ctx.beginPath();
      ctx.moveTo(sx - half * 0.85, sy - half * 0.1);
      ctx.lineTo(sx, sy - half);
      ctx.lineTo(sx + half * 0.85, sy - half * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    }
    case 'Farm': {
      ctx.fillStyle = '#8a6a3a';
      for (let i = -2; i <= 2; i++) {
        ctx.fillRect(sx - half * 0.85, sy + i * (half * 0.32), half * 1.7, half * 0.14);
      }
      break;
    }
    case 'LumberCamp': {
      ctx.fillStyle = '#6b4a2a';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(sx - half * 0.4 + i * 8, sy + half * 0.35, 10, 4, 0.15, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'MiningCamp': {
      ctx.fillStyle = '#7a7a80';
      ctx.beginPath();
      ctx.moveTo(sx - half * 0.5, sy + half * 0.5);
      ctx.lineTo(sx, sy - half * 0.1);
      ctx.lineTo(sx + half * 0.5, sy + half * 0.5);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'Blacksmith': {
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(sx + half * 0.3, sy - half * 1.3, half * 0.28, half * 0.9);
      if (Math.sin(state.time * 3 + b.id) > 0) {
        ctx.fillStyle = 'rgba(200,200,200,0.4)';
        ctx.beginPath();
        ctx.arc(sx + half * 0.44, sy - half * 1.4, half * 0.18, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'Market': {
      ctx.fillStyle = '#c99a3a';
      ctx.beginPath();
      ctx.moveTo(sx - half * 0.85, sy - half * 0.05);
      ctx.lineTo(sx - half * 0.5, sy - half * 0.9);
      ctx.lineTo(sx + half * 0.5, sy - half * 0.9);
      ctx.lineTo(sx + half * 0.85, sy - half * 0.05);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#7a5a20';
      for (let i = -1; i <= 1; i++) {
        ctx.fillRect(sx + i * half * 0.5 - 2, sy - half * 0.15, 4, half * 0.5);
      }
      break;
    }
    case 'University': {
      ctx.fillStyle = '#8a8a95';
      roundRectPath(sx - half * 0.7, sy - half * 0.9, half * 1.4, half * 0.9, 3);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#c7cbe0';
      ctx.beginPath();
      ctx.arc(sx, sy - half * 0.95, half * 0.32, Math.PI, 0);
      ctx.fill();
      break;
    }
    case 'Monastery': {
      ctx.fillStyle = '#d8d0b8';
      roundRectPath(sx - half * 0.55, sy - half * 1.1, half * 1.1, half * 1.1, 4);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#c94f3f';
      ctx.fillRect(sx - half * 0.08, sy - half * 1.35, half * 0.16, half * 0.35);
      ctx.fillRect(sx - half * 0.2, sy - half * 1.22, half * 0.4, half * 0.12);
      break;
    }
    case 'SiegeWorkshop': {
      ctx.fillStyle = '#5a4a30';
      ctx.fillRect(sx - half * 0.8, sy - half * 0.5, half * 1.6, half * 0.5);
      ctx.strokeStyle = '#2a2010';
      ctx.lineWidth = 2;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(sx + i * half * 0.32, sy - half * 0.5);
        ctx.lineTo(sx + i * half * 0.32, sy);
        ctx.stroke();
      }
      break;
    }
    case 'Wonder': {
      ctx.fillStyle = '#e8e0c8';
      for (let i = -2; i <= 2; i++) {
        ctx.fillRect(sx + i * half * 0.42 - half * 0.09, sy - half * 1.3, half * 0.18, half * 1.3);
      }
      ctx.fillStyle = '#d4c088';
      ctx.fillRect(sx - half * 1.05, sy - half * 1.3, half * 2.1, half * 0.16);
      ctx.strokeStyle = 'rgba(255,224,150,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();
      break;
    }
    case 'Wall': {
      ctx.fillStyle = '#9a9a90';
      ctx.fillRect(sx - half, sy - half * 0.9, half * 2, half * 1.8);
      ctx.fillStyle = '#7a7a70';
      for (let i = -2; i <= 2; i++) {
        ctx.fillRect(sx + i * half * 0.4 - 3, sy - half * 1.05, 6, half * 0.25);
      }
      break;
    }
    case 'Gate': {
      ctx.fillStyle = b.open ? 'rgba(120,110,90,0.35)' : '#7a6a4a';
      ctx.fillRect(sx - half, sy - half * 0.9, half * 2, half * 1.8);
      if (!b.open) {
        ctx.strokeStyle = '#4a3f28';
        ctx.lineWidth = 1.5;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath();
          ctx.moveTo(sx + i * half * 0.6, sy - half * 0.85);
          ctx.lineTo(sx + i * half * 0.6, sy + half * 0.85);
          ctx.stroke();
        }
      }
      break;
    }
    case 'WatchTower': {
      ctx.fillStyle = '#8a8578';
      ctx.beginPath();
      ctx.moveTo(sx - half * 0.4, sy + half * 0.4);
      ctx.lineTo(sx - half * 0.5, sy - half * 0.9);
      ctx.lineTo(sx + half * 0.5, sy - half * 0.9);
      ctx.lineTo(sx + half * 0.4, sy + half * 0.4);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#6a655a';
      ctx.fillRect(sx - half * 0.6, sy - half * 1.15, half * 1.2, half * 0.25);
      break;
    }
    default: {
      ctx.fillStyle = BUILDING_ROOF_COLOR.dark;
      ctx.fillRect(sx - half * 0.8, sy - half * 0.15, half * 1.6, half * 0.15);
    }
  }
}

function drawBuilding(b) {
  const sx = b.x - camera.x;
  const sy = b.y - camera.y;
  const half = (b.sizeTiles * TILE) / 2;
  if (sx < -half - 40 || sy < -half - 40 || sx > viewW() + 40 || sy > viewH() + 40) return;
  const isSel = selection.includes(b);
  const pal = ownerPalette(b.owner);
  drawShadow(sx, sy + half * 0.55, half * 1.05, half * 0.4);

  ctx.globalAlpha = b.constructing ? 0.6 : 1;
  const grad = ctx.createLinearGradient(sx, sy - half, sx, sy + half);
  grad.addColorStop(0, pal.light);
  grad.addColorStop(1, pal.dark);
  ctx.fillStyle = grad;
  roundRectPath(sx - half, sy - half, half * 2, half * 2, 4);
  ctx.fill();
  ctx.strokeStyle = isSel ? '#ffe066' : pal.darkest;
  ctx.lineWidth = isSel ? 3 : 2;
  ctx.stroke();

  if (!b.constructing) drawBuildingDetail(b, sx, sy, half, pal);

  if (b.constructing) {
    ctx.save();
    roundRectPath(sx - half, sy - half, half * 2, half * 2, 4);
    ctx.clip();
    ctx.strokeStyle = 'rgba(255,230,150,0.4)';
    ctx.lineWidth = 3;
    for (let i = -4; i <= 4; i++) {
      ctx.beginPath();
      ctx.moveTo(sx - half + i * (half / 2), sy - half);
      ctx.lineTo(sx - half + i * (half / 2) + half * 2, sy + half);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  ctx.font = `${Math.min(22, half)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const icon = BUILD_ICON[b.type] || '?';
  // 用一次「往右下偏移的深色文字」代替 shadowBlur 做陰影效果——shadowBlur 是軟體模糊，
  // 建築物一多，每幀都對每個圖示做模糊運算會明顯拖慢畫面（這是流暢度優化的重點之一）。
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillText(icon, sx + 1, sy + half * 0.15 + 1);
  ctx.fillStyle = '#fff';
  ctx.fillText(icon, sx, sy + half * 0.15);

  drawHpBar(sx, sy - half - 11, half * 1.6, b.hp / b.maxHp, isSel);
  if (b.constructing) {
    ctx.fillStyle = '#ffe066';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText('建造中', sx, sy + half + 12);
  }
  if (b.research) {
    const ratio = 1 - b.research.timeLeft / b.research.total;
    roundRectPath(sx - half, sy + half + 4, half * 2, 4, 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
    roundRectPath(sx - half, sy + half + 4, half * 2 * ratio, 4, 2);
    ctx.fillStyle = '#7cc7ff'; ctx.fill();
  }
  if (b.flashTimer > 0) {
    roundRectPath(sx - half, sy - half, half * 2, half * 2, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
  }
}

function drawUnit(u) {
  const sx = u.x - camera.x;
  const sy = u.y - camera.y;
  if (sx < -30 || sy < -30 || sx > viewW() + 30 || sy > viewH() + 30) return;
  const isSel = selection.includes(u);
  const pal = ownerPalette(u.owner);

  drawShadow(sx, sy + u.radius * 0.65, u.radius * 0.9, u.radius * 0.4);

  if (isSel) {
    const pulse = 2.5 + Math.sin(state.time * 5) * 1.2;
    ctx.strokeStyle = 'rgba(255,224,102,0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(sx, sy + u.radius * 0.6, u.radius + pulse, (u.radius + pulse) * 0.5, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  if (u.stats.class !== 'villager' && u.path && u.path.length > 0) {
    const fx = sx + Math.cos(u.facing) * (u.radius + 5);
    const fy = sy + Math.sin(u.facing) * (u.radius + 5);
    ctx.fillStyle = pal.darkest;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx - Math.cos(u.facing - 0.5) * 5, fy - Math.sin(u.facing - 0.5) * 5);
    ctx.lineTo(fx - Math.cos(u.facing + 0.5) * 5, fy - Math.sin(u.facing + 0.5) * 5);
    ctx.closePath();
    ctx.fill();
  }

  const grad = ctx.createRadialGradient(sx - u.radius * 0.3, sy - u.radius * 0.3, 1, sx, sy, u.radius);
  grad.addColorStop(0, pal.light);
  grad.addColorStop(1, pal.dark);
  ctx.beginPath();
  ctx.arc(sx, sy, u.radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = isSel ? '#ffe066' : pal.darkest;
  ctx.lineWidth = isSel ? 2.5 : 1.5;
  ctx.stroke();
  if (u.flashTimer > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
  }
  ctx.font = `${Math.round(u.radius * 1.15)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(UNIT_ICON[u.type] || '?', sx, sy + 1);
  if (u.hp < u.maxHp || isSel) drawHpBar(sx, sy - u.radius - 10, u.radius * 2.2, u.hp / u.maxHp, isSel);
  if (u.carry.amount > 0) {
    const cx = sx + u.radius * 0.7, cy = sy - u.radius * 0.7;
    ctx.fillStyle = '#1a1410';
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = u.carry.type === 'wood' ? '#4a8a3a' : u.carry.type === 'gold' ? '#e8c14a' : '#d9843a';
    ctx.beginPath(); ctx.arc(cx, cy, 4.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawProjectile(p) {
  const sx = p.x - camera.x;
  const sy = p.y - camera.y;
  const ang = Math.atan2(p.target.y - p.y, p.target.x - p.x);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(ang);
  ctx.strokeStyle = '#3a2a10';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-9, 0);
  ctx.lineTo(4, 0);
  ctx.stroke();
  ctx.fillStyle = '#2a1c08';
  ctx.beginPath();
  ctx.moveTo(7, 0);
  ctx.lineTo(2, -2.5);
  ctx.lineTo(2, 2.5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPlacementGhost() {
  if (!placement) return;
  const def = BUILDINGS[placement.type];
  const { tx, ty } = state.map.worldToTile(pointerWorld.x, pointerWorld.y);
  const c = state.map.tileCenter(tx, ty);
  const sx = c.x - camera.x;
  const sy = c.y - camera.y;
  const half = (def.size * TILE) / 2;
  const valid = state.map.canPlaceFootprint(c.x, c.y, def.size) && human.canAfford(def.cost);
  ctx.globalAlpha = 0.55;
  roundRectPath(sx - half, sy - half, half * 2, half * 2, 4);
  ctx.fillStyle = valid ? '#4caf50' : '#e53935';
  ctx.fill();
  ctx.strokeStyle = valid ? '#bff5b0' : '#ffb3ad';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.font = `${Math.min(22, half)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(BUILD_ICON[placement.type] || '?', sx, sy);
}

// 選取訓練建築時，若設過集結點就在地圖上畫一支小旗子——不畫的話，玩家點地圖
// 設定集結點之後完全不知道剛剛設到哪裡去了，感覺像沒反應。
function drawRallyMarkers() {
  for (const e of selection) {
    if (e.kind !== 'building' || e.owner !== human || !e.rally) continue;
    const sx = e.rally.x - camera.x;
    const sy = e.rally.y - camera.y;
    if (sx < -20 || sy < -20 || sx > viewW() + 20 || sy > viewH() + 20) continue;
    ctx.strokeStyle = '#ffe066';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy + 14);
    ctx.lineTo(sx, sy - 14);
    ctx.stroke();
    ctx.fillStyle = '#ffe066';
    ctx.beginPath();
    ctx.moveTo(sx, sy - 14);
    ctx.lineTo(sx + 12, sy - 9);
    ctx.lineTo(sx, sy - 4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(sx, sy + 15, 6, 2.5, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawSelectionBox() {
  if (!dragStart || !dragCurrent) return;
  const dx = Math.abs(dragCurrent.x - dragStart.x);
  const dy = Math.abs(dragCurrent.y - dragStart.y);
  if (dx < 6 && dy < 6) return;
  const x = Math.min(dragStart.x, dragCurrent.x);
  const y = Math.min(dragStart.y, dragCurrent.y);
  ctx.fillStyle = 'rgba(255,224,102,0.12)';
  ctx.fillRect(x, y, dx, dy);
  ctx.strokeStyle = '#ffe066';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, dx, dy);
}

function positiveMod(n, m) {
  return ((n % m) + m) % m;
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 世界內容統一用 zoom 縮放繪製，讓手機小螢幕也能看到夠寬廣的地圖範圍；
  // 觸控框選框則是跟著手指的螢幕座標，不套用縮放（在 restore 之後才畫）。
  ctx.save();
  ctx.scale(zoom, zoom);

  const vw = viewW();
  const vh = viewH();

  ctx.save();
  const patSize = TILE * 4;
  ctx.translate(-positiveMod(camera.x, patSize), -positiveMod(camera.y, patSize));
  ctx.fillStyle = groundPattern;
  ctx.fillRect(0, 0, vw + patSize, vh + patSize);
  ctx.restore();

  // 格線改成單一路徑一次性 stroke，避免每格都各自 beginPath/stroke（在建築物多、
  // 螢幕格數多時，這是每一幀畫面卡頓最主要的成因之一）。
  ctx.strokeStyle = 'rgba(0,0,0,0.05)';
  ctx.beginPath();
  const startTx = Math.floor(camera.x / TILE);
  const startTy = Math.floor(camera.y / TILE);
  for (let tx = startTx; tx < startTx + vw / TILE + 2; tx++) {
    const sx = tx * TILE - camera.x;
    ctx.moveTo(sx, 0); ctx.lineTo(sx, vh);
  }
  for (let ty = startTy; ty < startTy + vh / TILE + 2; ty++) {
    const sy = ty * TILE - camera.y;
    ctx.moveTo(0, sy); ctx.lineTo(vw, sy);
  }
  ctx.stroke();

  const drawList = [];
  for (const r of state.map.resources) drawList.push({ y: r.y, draw: () => drawResourceNode(r) });
  for (const rl of state.map.relics) drawList.push({ y: rl.y, draw: () => drawRelic(rl) });
  for (const p of state.players) {
    for (const b of p.buildings) {
      if (!shouldRenderEntity(state, b)) continue;
      drawList.push({ y: b.y + (b.sizeTiles * TILE) / 2, draw: () => drawBuilding(b) });
    }
    for (const u of p.units) {
      if (!shouldRenderEntity(state, u)) continue;
      drawList.push({ y: u.y, draw: () => drawUnit(u) });
    }
  }
  drawList.sort((a, b) => a.y - b.y);
  for (const item of drawList) item.draw();

  for (const pr of state.projectiles) drawProjectile(pr);
  drawRallyMarkers();
  drawPlacementGhost();
  drawFogOfWar();
  ctx.restore();

  drawSelectionBox();
}

function drawFogOfWar() {
  const map = state.map;
  const startTx = Math.max(0, Math.floor(camera.x / TILE));
  const startTy = Math.max(0, Math.floor(camera.y / TILE));
  const endTx = Math.min(map.w, Math.ceil((camera.x + viewW()) / TILE) + 1);
  const endTy = Math.min(map.h, Math.ceil((camera.y + viewH()) / TILE) + 1);
  // 只用「探索過／沒探索過」兩段式：探索過的地形一律完全顯示，不再額外疊一層
  // 灰色暗紗——先前疊暗紗的做法會讓玩家覺得「明明探索過了，怎麼還跟著單位
  // 移動冒出一塊灰色」。敵方單位是否顯示仍由 visibleNow 控制（見 shouldRenderEntity），
  // 不受這裡簡化的影響。
  for (let ty = startTy; ty < endTy; ty++) {
    const rowBase = ty * map.w;
    for (let tx = startTx; tx < endTx; tx++) {
      const idx = rowBase + tx;
      if (map.explored[idx]) continue;
      ctx.fillStyle = 'rgba(4,7,3,0.96)';
      ctx.fillRect(tx * TILE - camera.x, ty * TILE - camera.y, TILE + 1, TILE + 1);
    }
  }
}

function ageLabel(ageId) {
  return AGES[ageId].name;
}

function buildBuildingButtons(container) {
  const label = document.createElement('div');
  label.className = 'sectionLabel';
  label.textContent = '建造建築物';
  container.appendChild(label);
  const options = Object.keys(BUILDINGS).filter((type) => {
    if (type === 'TownCenter') return false;
    const def = BUILDINGS[type];
    const req = def.requiresAge || 0;
    if (def.isWonder && human.age < 3) return false;
    return req <= human.age;
  });
  for (const type of options) {
    const def = BUILDINGS[type];
    const btn = document.createElement('div');
    const affordable = human.canAfford(def.cost);
    btn.className = 'actBtn' + (affordable ? '' : ' disabled');
    btn.innerHTML = `<div class="icon">${BUILD_ICON[type]}</div><div>${def.name}</div><div class="cost">${costText(def.cost)}</div>`;
    onTap(btn, () => {
      if (!human.canAfford(def.cost)) return;
      placement = { type };
      placementCancelBtn.style.display = 'block';
    });
    container.appendChild(btn);
  }
}

function trainButton(container, building, rootOrType, isRoot) {
  const type = isRoot ? currentLineType(human, rootOrType) : rootOrType;
  const def = UNITS[type];
  if (!def) return;
  if (def.requiresAge !== undefined && human.age < def.requiresAge) return;
  const affordable = human.canAfford(def.cost || {}) && building.trainQueue.length < 10;
  const btn = document.createElement('div');
  btn.className = 'actBtn' + (affordable ? '' : ' disabled');
  btn.innerHTML = `<div class="icon">${UNIT_ICON[type]}</div><div>${def.name}</div><div class="cost">${costText(def.cost)}</div>`;
  if (building.trainQueue.length > 0 && building.trainQueue[0].type === type) {
    const ratio = building.trainProgress / building.trainQueue[0].totalTime;
    btn.innerHTML += `<div class="miniProgress" style="width:${ratio * 100}%"></div>`;
  }
  const sameQueued = building.trainQueue.filter((q) => q.type === type).length;
  if (sameQueued > 0) btn.innerHTML += `<div class="queueBadge">${sameQueued}</div>`;
  onTap(btn, () => { startTraining(human, building, type); refreshUI(); });
  container.appendChild(btn);
}

function upgradeButton(container, building, upgradeKey) {
  const up = UNIT_UPGRADES[upgradeKey];
  if (human.age < up.requiresAge) return;
  if (building.research) return;
  const affordable = human.canAfford(up.cost);
  const btn = document.createElement('div');
  btn.className = 'actBtn' + (affordable ? '' : ' disabled');
  btn.innerHTML = `<div class="icon">⬆️</div><div>${up.name}</div><div class="cost">${costText(up.cost)}</div>`;
  onTap(btn, () => { startUnitUpgrade(human, building, upgradeKey); refreshUI(); });
  container.appendChild(btn);
}

function techButton(container, building, key) {
  const tech = TECHS[key];
  if (human.age < tech.requiresAge) return;
  if (human.techsResearched.has(key)) return;
  if (building.research) return;
  const affordable = human.canAfford(tech.cost);
  const btn = document.createElement('div');
  btn.className = 'actBtn' + (affordable ? '' : ' disabled');
  btn.innerHTML = `<div class="icon">🧪</div><div>${tech.name}</div><div class="cost">${costText(tech.cost)}</div>`;
  onTap(btn, () => { startResearchTech(human, building, key); refreshUI(); });
  container.appendChild(btn);
}

function buildAgeUpButton(container, building) {
  const nextAge = AGES[human.age + 1];
  if (!nextAge) return;
  const label = document.createElement('div');
  label.className = 'sectionLabel';
  label.textContent = '時代升級';
  container.appendChild(label);
  const btn = document.createElement('div');
  const affordable = human.canAfford(nextAge.nextCost) && !human.ageResearch;
  btn.className = 'actBtn' + (affordable ? '' : ' disabled');
  btn.innerHTML = `<div class="icon">⏫</div><div>晉級：${nextAge.name}</div><div class="cost">${costText(nextAge.nextCost)}</div>`;
  if (human.ageResearch) {
    const ratio = 1 - human.ageResearch.timeLeft / human.ageResearch.total;
    btn.innerHTML += `<div class="miniProgress" style="width:${ratio * 100}%"></div>`;
  }
  onTap(btn, () => { startAgeUp(human); refreshUI(); });
  container.appendChild(btn);
}

function buildTradeButtons(container) {
  const label = document.createElement('div');
  label.className = 'sectionLabel';
  label.textContent = `市場交易（每次 ${MARKET_TRADE_AMOUNT}）`;
  container.appendChild(label);
  const rows = [
    { type: 'wood', name: '木材', icon: '🌲' },
    { type: 'food', name: '食物', icon: '🌾' },
  ];
  for (const r of rows) {
    const sellBtn = document.createElement('div');
    const canSell = (human.resources[r.type] || 0) >= MARKET_TRADE_AMOUNT;
    sellBtn.className = 'actBtn' + (canSell ? '' : ' disabled');
    sellBtn.innerHTML = `<div class="icon">${r.icon}➡️🪙</div><div>賣出${r.name}</div><div class="cost">換 ${Math.round(MARKET_TRADE_AMOUNT * marketSellRate(human))} 金</div>`;
    onTap(sellBtn, () => { sellResource(human, r.type); refreshUI(); });
    container.appendChild(sellBtn);

    const buyBtn = document.createElement('div');
    const buyCost = MARKET_TRADE_AMOUNT * marketBuyRate(human);
    const canBuy = (human.resources.gold || 0) >= buyCost;
    buyBtn.className = 'actBtn' + (canBuy ? '' : ' disabled');
    buyBtn.innerHTML = `<div class="icon">🪙➡️${r.icon}</div><div>買入${r.name}</div><div class="cost">花 ${Math.round(buyCost)} 金</div>`;
    onTap(buyBtn, () => { buyResource(human, r.type); refreshUI(); });
    container.appendChild(buyBtn);
  }
}

function buildGateToggleButton(container, building) {
  const label = document.createElement('div');
  label.className = 'sectionLabel';
  label.textContent = '城門控制';
  container.appendChild(label);
  const btn = document.createElement('div');
  btn.className = 'actBtn';
  btn.innerHTML = `<div class="icon">${building.open ? '🔓' : '🔒'}</div><div>${building.open ? '關閉城門' : '開啟城門'}</div>`;
  onTap(btn, () => { toggleGate(state.map, building); refreshUI(); });
  container.appendChild(btn);
}

function buildFarmWorkerButton(container, farm) {
  const label = document.createElement('div');
  label.className = 'sectionLabel';
  label.textContent = '農田工作';
  container.appendChild(label);
  const btn = document.createElement('div');
  if (farm.worker) {
    btn.className = 'actBtn disabled';
    btn.innerHTML = farm.workerArrived
      ? '<div class="icon">🧑‍🌾</div><div>已有村民耕作中</div>'
      : '<div class="icon">🚶</div><div>村民正前往農田</div>';
    container.appendChild(btn);
    return;
  }
  const myVillagers = selection.filter((e) => e.kind === 'unit' && e.owner === human && e.stats.class === 'villager');
  // 沒有先選村民時，優先挑「真正閒著」的村民頂上去，不要誤徵用正在採集/建造中
  // 的村民，不然玩家會發現自己某個資源點的村民莫名其妙不見了。
  const idleVillager = human.units.find((u) => u.stats.class === 'villager' && !u.task);
  const candidate = myVillagers[0] || idleVillager;
  btn.className = 'actBtn' + (candidate ? '' : ' disabled');
  btn.innerHTML = '<div class="icon">🧑‍🌾</div><div>指派村民耕作</div>';
  onTap(btn, () => {
    if (candidate) { issueFarmWork(state.map, candidate, farm); refreshUI(); }
  });
  container.appendChild(btn);
}

function buildStanceButtons(container, units) {
  const label = document.createElement('div');
  label.className = 'sectionLabel';
  label.textContent = '駐守模式';
  container.appendChild(label);
  const modes = [
    { key: 'aggressive', name: '主動迎戰', icon: '⚔️' },
    { key: 'stand', name: '原地駐守', icon: '🛡️' },
  ];
  for (const m of modes) {
    const btn = document.createElement('div');
    const isSelected = units.every((u) => u.stance === m.key);
    btn.className = 'actBtn' + (isSelected ? ' selectedStance' : '');
    btn.innerHTML = `<div class="icon">${m.icon}</div><div>${m.name}</div>`;
    onTap(btn, () => { for (const u of units) u.stance = m.key; refreshUI(); });
    container.appendChild(btn);
  }
}

function refreshActionButtons() {
  actionButtonsEl.innerHTML = '';
  const myBuildings = selection.filter((e) => e.kind === 'building' && e.owner === human);
  const myVillagers = selection.filter((e) => e.kind === 'unit' && e.owner === human && e.stats.class === 'villager');
  const myCombatUnits = selection.filter((e) => e.kind === 'unit' && e.owner === human && e.stats.class !== 'villager' && e.stats.class !== 'monk');

  if (myBuildings.length === 1) {
    const b = myBuildings[0];
    if (b.constructing) {
      const info = document.createElement('div');
      info.className = 'sectionLabel';
      const rate = ((b.maxHp * 0.9) / (b.def.buildTime || 10)) * (human.buildSpeedMul || 1);
      const secLeft = Math.max(0, Math.ceil((b.maxHp - b.hp) / rate));
      info.textContent = `自動施工中，約 ${secLeft} 秒後完工`;
      actionButtonsEl.appendChild(info);
    } else {
      if (b.def.trains) {
        const label = document.createElement('div');
        label.className = 'sectionLabel';
        label.textContent = '訓練單位';
        actionButtonsEl.appendChild(label);
        if (human.currentPop() >= human.popCap) {
          // 人口已滿時訓練按鈕還是能點、扣資源、排進佇列（跟大多數帝國遊戲一樣），
          // 但排到的單位完工進度會卡在原地不動——沒有這行提示的話，玩家只會看到
          // 「付了錢卻什麼也沒發生」，還以為是 bug。
          const warn = document.createElement('div');
          warn.className = 'sectionLabel popWarn';
          warn.textContent = '⚠️ 人口已達上限，佇列中的單位不會完工，請先建造房屋';
          actionButtonsEl.appendChild(warn);
        }
        for (const slot of b.def.trains) {
          const isRoot = Object.prototype.hasOwnProperty.call(human.unitLine, slot);
          trainButton(actionButtonsEl, b, slot, isRoot);
        }
        const upKeys = Object.keys(UNIT_UPGRADES).filter((key) => {
          const up = UNIT_UPGRADES[key];
          if (up.building !== b.type) return false;
          return Object.values(human.unitLine).includes(up.from);
        });
        if (upKeys.length > 0) {
          const upLabel = document.createElement('div');
          upLabel.className = 'sectionLabel';
          upLabel.textContent = '兵種升級';
          actionButtonsEl.appendChild(upLabel);
          for (const key of upKeys) upgradeButton(actionButtonsEl, b, key);
        }
      }
      if (b.def.researches) {
        const label = document.createElement('div');
        label.className = 'sectionLabel';
        label.textContent = '科技研究';
        actionButtonsEl.appendChild(label);
        for (const key of b.def.researches) techButton(actionButtonsEl, b, key);
      }
      if (b.def.canAgeUp) buildAgeUpButton(actionButtonsEl, b);
      if (b.type === 'Market') buildTradeButtons(actionButtonsEl);
      if (b.def.isGate) buildGateToggleButton(actionButtonsEl, b);
      if (b.def.isFarm) buildFarmWorkerButton(actionButtonsEl, b);
    }
  }

  if (myVillagers.length > 0 && myBuildings.length === 0) {
    buildBuildingButtons(actionButtonsEl);
  }

  if (myCombatUnits.length > 0 && myBuildings.length === 0) {
    buildStanceButtons(actionButtonsEl, myCombatUnits);
  }

  if (myBuildings.length === 0 && myVillagers.length === 0 && selection.length === 0) {
    const hint = document.createElement('div');
    hint.className = 'sectionLabel';
    hint.textContent = '選取單位或建築以查看可用指令';
    actionButtonsEl.appendChild(hint);
  }
}

function refreshSelectionInfo() {
  selectionInfoEl.innerHTML = '';
  if (selection.length === 0) {
    selectionInfoEl.innerHTML = '<div class="placeholder">尚未選取任何單位或建築</div>';
    return;
  }
  if (selection.length === 1) {
    const e = selection[0];
    if (e.kind === 'unit') {
      const stats = effectiveStats(e);
      selectionInfoEl.innerHTML = `
        <div class="name">${UNIT_ICON[e.type] || ''} ${stats.name}${e.owner.isAI ? '（敵方）' : ''}</div>
        <div class="hpbar"><div class="fill" style="width:${(e.hp / e.maxHp) * 100}%"></div></div>
        <div class="stats">
          <span>HP ${Math.ceil(e.hp)}/${e.maxHp}</span>
          <span>攻擊 ${stats.attack}</span>
          <span>護甲 ${stats.armor}</span>
          <span>射程 ${(stats.range / TILE).toFixed(1)}格</span>
        </div>`;
    } else {
      let extra = '';
      if (e.trainQueue && e.trainQueue.length > 0) {
        extra += `<div>訓練佇列：${e.trainQueue.map((q) => UNITS[q.type].name).join('、')}</div>`;
      }
      if (e.research) {
        const rname = e.research.kind === 'tech' ? TECHS[e.research.key].name : UNIT_UPGRADES[e.research.key].name;
        extra += `<div>研究中：${rname}（剩 ${e.research.timeLeft.toFixed(1)}s）</div>`;
      }
      if (e.def.isFarm) {
        extra += `<div>剩餘食物：${Math.ceil(e.foodLeft || 0)}</div>`;
        let farmStatus = '尚未指派村民';
        if (e.constructing) farmStatus = '自動施工中';
        else if (e.worker) farmStatus = e.workerArrived ? '有村民自動耕作中' : '村民正前往農田';
        extra += `<div>耕作狀態：${farmStatus}</div>`;
      }
      if (e.def.relicDropOff) extra += `<div>存放聖物：${e.relicsHeld || 0} 個</div>`;
      if (e.def.isGate) extra += `<div>城門狀態：${e.open ? '開啟' : '關閉'}</div>`;
      if (e.def.isWonder) {
        extra += e.owner.wonderCountdown && e.owner.wonderBuilding === e
          ? `<div>奇觀勝利倒數：${Math.ceil(e.owner.wonderCountdown.timeLeft)}s</div>`
          : '<div>奇觀已建成，倒數即將開始</div>';
      }
      selectionInfoEl.innerHTML = `
        <div class="name">${BUILD_ICON[e.type] || ''} ${e.def.name}${e.owner.isAI ? '（敵方）' : ''}</div>
        <div class="hpbar"><div class="fill" style="width:${(e.hp / e.maxHp) * 100}%"></div></div>
        <div class="stats"><span>HP ${Math.ceil(e.hp)}/${e.maxHp}</span></div>
        ${extra}`;
    }
    return;
  }
  const counts = {};
  for (const e of selection) {
    const key = e.kind === 'unit' ? e.type : e.type;
    counts[key] = (counts[key] || 0) + 1;
  }
  let html = `<div class="name">已選取 ${selection.length} 個單位</div>`;
  for (const k in counts) {
    const nm = UNITS[k] ? UNITS[k].name : (BUILDINGS[k] ? BUILDINGS[k].name : k);
    html += `<div class="groupItem"><span>${nm}</span><span>${counts[k]}</span></div>`;
  }
  selectionInfoEl.innerHTML = html;
}

function refreshTopbar() {
  topbarEls.wood.textContent = Math.floor(human.resources.wood);
  topbarEls.food.textContent = Math.floor(human.resources.food);
  topbarEls.gold.textContent = Math.floor(human.resources.gold);
  topbarEls.relic.textContent = human.relics;
  topbarEls.pop.textContent = `${human.currentPop()}/${human.popCap}`;
  topbarEls.ageName.textContent = ageLabel(human.age);
  if (human.ageResearch) {
    topbarEls.ageProgressWrap.classList.remove('hidden');
    const ratio = 1 - human.ageResearch.timeLeft / human.ageResearch.total;
    topbarEls.ageProgressFill.style.width = `${ratio * 100}%`;
  } else {
    topbarEls.ageProgressWrap.classList.add('hidden');
  }
  if (human.wonderCountdown) {
    topbarEls.wonderInfo.classList.remove('hidden');
    topbarEls.wonderInfo.textContent = `🗿 奇觀倒數 ${Math.ceil(human.wonderCountdown.timeLeft)}s`;
  } else {
    topbarEls.wonderInfo.classList.add('hidden');
  }
}

function refreshUI() {
  refreshTopbar();
  refreshSelectionInfo();
  refreshActionButtons();
  placementCancelBtn.style.display = placement ? 'block' : 'none';
  bottompanelEl.classList.toggle('collapsed', selection.length === 0 && !placement);
}

let lastTs = null;
function frame(ts) {
  if (lastTs === null) lastTs = ts;
  let dt = (ts - lastTs) / 1000;
  lastTs = ts;
  dt = Math.min(dt, 0.05);
  if (state) {
    if (!state.ended) update(dt);
    render();
    renderMinimap();
  }
  requestAnimationFrame(frame);
}

resizeCanvas();
resizeMinimap();
showSetupScreen();
requestAnimationFrame(frame);
</script>
</body>
</html>
